<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ислам ерлер дүкені</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;display:flex;justify-content:center;overflow:hidden;min-height:100vh}
.feed{width:100%;max-width:430px;height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;position:relative}
.feed::-webkit-scrollbar{display:none}

/* WELCOME */
.welcome{height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:#000}
.w-bg{position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 50% 20%,#1a0040 0%,#000 65%)}
.w-glow{position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(140,40,255,.4) 0%,transparent 70%);top:5%;left:50%;transform:translateX(-50%);filter:blur(50px);animation:pulseG 4s ease-in-out infinite alternate}
.w-noise{position:absolute;inset:0;opacity:.25;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.07'/%3E%3C/svg%3E")}
@keyframes pulseG{0%{opacity:.5;transform:translateX(-50%) scale(1)}100%{opacity:1;transform:translateX(-50%) scale(1.3)}}
.w-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:0 28px;animation:fadeUp .9s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.avatar-ring{width:148px;height:148px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#8a2be2,#ff2d78,#ffb800);margin-bottom:24px;box-shadow:0 0 50px rgba(138,43,226,.5)}
.avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:top center;border:3px solid #000}
.w-tag{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:#9d4dff;background:rgba(157,77,255,.12);border:1px solid rgba(157,77,255,.3);padding:6px 18px;border-radius:100px;margin-bottom:16px}
.w-title{font-family:'Unbounded',sans-serif;font-size:24px;font-weight:900;color:#fff;text-align:center;line-height:1.3;margin-bottom:10px}
.w-title span{background:linear-gradient(90deg,#9d4dff,#ff2d78);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.w-sub{font-family:'Inter',sans-serif;font-size:12px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:44px;line-height:1.7}
.scroll-cta{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;animation:bounce 2.2s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.scroll-label{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.4)}
.scroll-arrow{width:46px;height:46px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05)}
.scroll-arrow svg{width:18px;height:18px}

/* PRODUCT */
.ps{height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ps-glow{position:absolute;width:300px;height:300px;border-radius:50%;filter:blur(65px);opacity:.55;top:12%;left:50%;transform:translateX(-50%);pointer-events:none;z-index:1}
.ps-grid{position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:38px 38px}
.ps-noise{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:.2;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.06'/%3E%3C/svg%3E")}
.topbar{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:50px 22px 0}
.store-lbl{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase}
.page-pill{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:rgba(255,255,255,.3);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:5px 14px;border-radius:100px}
.badge{position:relative;z-index:5;align-self:flex-start;margin:14px 22px 0;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);padding:6px 16px;border-radius:100px}
.bdot{width:6px;height:6px;border-radius:50%;animation:blink 1.6s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.btxt{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.55)}
.stage{position:relative;z-index:4;flex:1;display:flex;align-items:center;justify-content:center;padding:0 18px;margin-top:6px}
.shadow{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:210px;height:28px;border-radius:50%;filter:blur(18px);opacity:.65}
.shoe-img{width:100%;max-width:310px;height:210px;object-fit:contain;position:relative;z-index:2;filter:drop-shadow(0 18px 36px rgba(0,0,0,.85));animation:float 3.8s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-1.2deg)}50%{transform:translateY(-11px) rotate(1.2deg)}}
.chips{position:relative;z-index:5;display:flex;gap:8px;padding:0 20px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:10px 14px;min-width:68px}
.chip-v{font-family:'Bebas Neue',sans-serif;font-size:19px;color:#fff;line-height:1}
.chip-k{font-family:'Inter',sans-serif;font-size:9px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.6px;margin-top:3px}
.chip.ac{border-color:var(--acc-border);background:var(--acc-bg)}
.chip.ac .chip-v{color:var(--acc)}
.info{position:relative;z-index:5;background:rgba(255,255,255,.038);border-top:1px solid rgba(255,255,255,.07);backdrop-filter:blur(22px);padding:18px 20px 30px}
.pname{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:900;color:#fff;line-height:1.25;margin-bottom:13px}
.prow{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.plbl{font-family:'Inter',sans-serif;font-size:10px;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:1px}
.pprice{font-family:'Bebas Neue',sans-serif;font-size:31px;color:#fff;letter-spacing:.5px}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:16px 22px;border-radius:18px;background:linear-gradient(135deg,#25D366 0%,#128C7E 100%);color:#fff;text-decoration:none;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;box-shadow:0 8px 28px rgba(37,211,102,.32);transition:transform .14s,box-shadow .14s}
.wa-btn:active{transform:scale(.97);box-shadow:0 4px 14px rgba(37,211,102,.18)}
.wa-btn svg{width:22px;height:22px;fill:#fff;flex-shrink:0}

/* theme vars per card */
.t1{background:linear-gradient(158deg,#0c0826 0%,#1e1050 45%,#120a30 100%);--acc:#a070ff;--acc-border:rgba(160,112,255,.4);--acc-bg:rgba(160,112,255,.1);--glow:#7b2fff;--shadow:#6a00ff}
.t2{background:linear-gradient(158deg,#021018 0%,#063040 45%,#010c18 100%);--acc:#00d4ff;--acc-border:rgba(0,212,255,.4);--acc-bg:rgba(0,212,255,.1);--glow:#00b4d8;--shadow:#0090c0}
.t3{background:linear-gradient(158deg,#180600 0%,#3d1000 45%,#1a0800 100%);--acc:#ff6040;--acc-border:rgba(255,96,64,.4);--acc-bg:rgba(255,96,64,.1);--glow:#ff4500;--shadow:#cc3000}
.t4{background:linear-gradient(158deg,#001410 0%,#003828 45%,#001820 100%);--acc:#00ff99;--acc-border:rgba(0,255,153,.4);--acc-bg:rgba(0,255,153,.1);--glow:#00cc77;--shadow:#009955}
.t5{background:linear-gradient(158deg,#100018 0%,#2d0045 45%,#0a0018 100%);--acc:#ff5599;--acc-border:rgba(255,85,153,.4);--acc-bg:rgba(255,85,153,.1);--glow:#dd1166;--shadow:#bb0044}
.t6{background:linear-gradient(158deg,#181000 0%,#3d2c00 45%,#180c00 100%);--acc:#ffcc00;--acc-border:rgba(255,204,0,.4);--acc-bg:rgba(255,204,0,.1);--glow:#ddaa00;--shadow:#bb8800}
.t7{background:linear-gradient(158deg,#001818 0%,#004040 45%,#000c0c 100%);--acc:#00ffee;--acc-border:rgba(0,255,238,.4);--acc-bg:rgba(0,255,238,.1);--glow:#00ccbb;--shadow:#009988}
.t8{background:linear-gradient(158deg,#180010 0%,#3d0028 45%,#0c0010 100%);--acc:#ff44bb;--acc-border:rgba(255,68,187,.4);--acc-bg:rgba(255,68,187,.1);--glow:#cc0099;--shadow:#990066}
.t9{background:linear-gradient(158deg,#001030 0%,#002060 45%,#000820 100%);--acc:#4488ff;--acc-border:rgba(68,136,255,.4);--acc-bg:rgba(68,136,255,.1);--glow:#2244dd;--shadow:#1133bb}
.t10{background:linear-gradient(158deg,#100800 0%,#301800 45%,#080400 100%);--acc:#ff8833;--acc-border:rgba(255,136,51,.4);--acc-bg:rgba(255,136,51,.1);--glow:#cc5500;--shadow:#aa3300}
</style>
</head>
